version: 2

models:
  - name: fct_daily_revenue
    description: >
      Daily revenue aggregated by location. Includes gross profit, order type mix
      (food/drink/mixed), and new vs. returning customer breakdown.
      Primary model for time-series revenue analysis.
    columns:
      - name: date_day
        description: Date of orders (truncated to day)
        data_tests:
          - not_null
      - name: location_id
        description: Foreign key to locations
        data_tests:
          - not_null
      - name: total_revenue
        description: Sum of order_total for all orders on this day at this location
        data_tests:
          - not_null
      - name: gross_profit
        description: total_revenue minus total_cost
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: fct_cohorts
    description: >
      Customer cohort retention analysis. Each row represents a cohort (defined by
      acquisition month) and their activity in a subsequent month.
      Use to build retention heatmaps and average retention curves.
    columns:
      - name: cohort_month
        description: Month the cohort was first acquired
        data_tests:
          - not_null
      - name: months_since_first_order
        description: 0 = acquisition month, 1 = first month after, etc.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: retention_rate
        description: Fraction of original cohort still active in this month (0.0 to 1.0)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

  - name: fct_customer_churn_features
    description: >
      Feature table for churn prediction ML model. One row per customer who
      had ordered before the cutoff date (dataset end minus 30 days).
      Includes RFM signals, ordering cadence, and product preference, all
      computed as of that cutoff — plus a churn label based on a genuine
      30-day holdout window that follows it. A naive "no order in the last
      90 days" label measured against the true end of the dataset produced
      only 1 churned customer out of 935, since this customer base orders
      every 3-6 days on average and the dataset simply ends while the
      business is still fully active — there's no room for anyone to go
      quiet near the edge. The holdout-window approach checks real future
      behavior instead and yields an 18% churn rate.
    columns:
      - name: customer_id
        description: Primary key
        data_tests:
          - not_null
          - unique
      - name: is_churned
        description: True if the customer placed no orders in the 30-day holdout window after the cutoff date
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: days_since_last_order
        description: Days between the customer's last order and the cutoff date (dataset end minus 30 days)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: fct_product_performance
    description: >
      Monthly product-level revenue, supply cost, and gross margin.
      Includes revenue rank within each month for easy top/bottom analysis.
    columns:
      - name: product_id
        description: Product identifier
        data_tests:
          - not_null
      - name: month
        description: First day of the calendar month
        data_tests:
          - not_null
      - name: gross_margin_pct
        description: Gross profit as a percentage of revenue
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "between -100 and 100"

  - name: fct_location_performance
    description: >
      Location-level performance summary with age-normalized revenue metrics.
      Use for cross-location benchmarking that accounts for how long each store
      has been open.
    columns:
      - name: location_id
        description: Primary key
        data_tests:
          - not_null
          - unique
      - name: revenue_per_month_open
        description: Total revenue divided by months the location has been open
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: fct_supply_cogs
    description: >
      Product-level cost of goods sold (COGS) analysis. Breaks down supply cost
      into perishable vs. non-perishable to identify margin risk from waste.
    columns:
      - name: product_id
        description: Primary key
        data_tests:
          - not_null
          - unique
      - name: gross_margin_pct
        description: Gross profit as a percentage of revenue
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between -100 and 100"
